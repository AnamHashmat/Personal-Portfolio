<!DOCTYPE html>

<head>

  <!-- Google Fonts for typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="styles.css" /><style>/* Contact Section Styles */
.contact-section {
  background-color: #fefefe;
  padding: 50px 20px;
}

.section-title {
  text-align: center;
  font-size: 2.2em;
  margin-bottom: 30px;
  color: #2c3e50;
}

.contact-info {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  max-width: 1000px;
  margin: 0 auto;
}

.contact-item {
  background-color: #fff;
  border-radius: 12px;
  padding: 20px;
  display: flex;
  align-items: center;
  transition: box-shadow 0.3s, transform 0.3s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}

.contact-item:hover {
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  transform: translateY(-3px);
}

.icon {
  font-size: 2.5em;
  margin-right: 15px;
}

.details h3 {
  margin: 0 0 8px 0;
  font-size: 1.2em;
  color: #34495e;
}

.contact-link {
  font-size: 1em;
  color: #2980b9;
  text-decoration: none;
  font-weight: 600;
}

.contact-link:hover {
  text-decoration: underline;
}

/* Responsive adjustments */
@media(max-width: 768px) {
  .section-title {
    font-size: 1.8em;
  }
  .icon {
    font-size: 2em;
  }
  .details h3 {
    font-size: 1.1em;
  }
}</style>
</head>
<body>

</section>
